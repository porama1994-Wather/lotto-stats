name: update-lottery-data

# รันอัตโนมัติหลังหวยออก (จ/พ/ศ 20:00 ไทย = 13:00 UTC) เผื่อเวลาเว็บอัปเดต -> รัน 22:30 ไทย
on:
  schedule:
    - cron: "30 15 * * 1,3,5"   # 15:30 UTC = 22:30 น. ไทย ทุกวันจันทร์ พุธ ศุกร์
  workflow_dispatch:            # กดรันเองจากหน้าเว็บ GitHub ได้ด้วย

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch latest results
        run: python fetch_lao_lottery.py --merge results.json --out results.json

      - name: Commit updated data
        run: |
          git config user.name "lotto-bot"
          git config user.email "bot@users.noreply.github.com"
          git add results.json
          git diff --cached --quiet || git commit -m "update results $(date +'%Y-%m-%d')"
          git push

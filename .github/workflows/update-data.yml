name: update-lottery-data

# หวยลาวพัฒนาออกทุกวันจันทร์-ศุกร์ (เปลี่ยนจาก จ/พ/ศ ตั้งแต่ 2 เม.ย. 2569)
# รันหลังหวยออก 20:00 ไทย = 13:00 UTC -> ตั้งรัน 22:30 ไทย เผื่อเวลาเว็บอัปเดต
on:
  schedule:
    - cron: "30 15 * * 1,2,3,4,5"   # 15:30 UTC = 22:30 น. ไทย ทุกวันจันทร์-ศุกร์
  workflow_dispatch:            # กดรันเองจากหน้าเว็บ GitHub ได้ด้วย

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch latest results
        run: python fetch_lao_lottery.py --merge results.json --out results.json

      - name: Fetch Thai lottery results
        run: python fetch_thai_lottery.py --merge results_thai.json --out results_thai.json

      - name: Commit updated data
        run: |
          git config user.name "lotto-bot"
          git config user.email "bot@users.noreply.github.com"
          git add results.json results_thai.json
          git diff --cached --quiet || git commit -m "update results $(date +'%Y-%m-%d')"
          git push
